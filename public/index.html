<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
  <meta name="theme-color" content="#0d1017" />
  <link rel="manifest" href="/manifest.json" />
  <title>Coach IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <div class="brand">COACH<b>·</b>IA</div>
    <div class="prog-name" id="progName">…</div>
  </header>

  <main>
    <!-- CHAT COACH -->
    <section class="view active" id="view-chat">
      <div id="chat-log" class="chat-log"></div>
    </section>

    <!-- SÉANCE -->
    <section class="view" id="view-seance">
      <h2 class="title">Séance</h2>
      <p class="subtitle" id="seance-sub">Ta séance du jour.</p>
      <div id="seance-content"></div>
    </section>

    <!-- HISTORIQUE -->
    <section class="view" id="view-history">
      <h2 class="title">Progression</h2>
      <p class="subtitle">Tes séances passées et ta régularité.</p>
      <div id="history-content"></div>
    </section>

    <!-- RÉGLAGES / PROGRAMME -->
    <section class="view" id="view-prog">
      <h2 class="title">Programme</h2>
      <p class="subtitle">Profil et objectifs du coach (l'ex-prompt Gemini).</p>
      <div id="prog-content"></div>
    </section>
  </main>

  <!-- Barre de saisie chat (visible seulement sur l'onglet Chat) -->
  <div class="chatbar" id="chatbar">
    <button class="quick" id="gen-btn" title="Générer la séance">⚡</button>
    <input id="chat-input" placeholder="Parle à ton coach…" autocomplete="off" />
    <button class="send" id="send-btn" aria-label="Envoyer">➤</button>
  </div>

  <nav>
    <button data-view="chat" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a8 8 0 0 1-11.5 7.2L4 20l1-4.5A8 8 0 1 1 21 12z"/></svg>
      Coach
    </button>
    <button data-view="seance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6.5 6.5h11M6.5 17.5h11M4 9v6M20 9v6M8 8v8M16 8v8"/></svg>
      Séance
    </button>
    <button data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V5M4 19h16M8 15l3-4 3 2 4-6"/></svg>
      Progression
    </button>
    <button data-view="prog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M18.4 5.6L17 7M7 17l-1.4 1.4"/></svg>
      Réglages
    </button>
  </nav>

  <div class="toast" id="toast"></div>
  <script src="/app.js"></script>
</body>
</html>
